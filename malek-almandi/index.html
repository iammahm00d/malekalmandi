<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملك المندي | روابط المطعم</title>
<meta name="description" content="روابط مطعم ملك المندي في السامر، جدة: القائمة، الطلب، الموقع، واتساب، الاتصال، وإنستغرام وتيك توك.">
<meta name="theme-color" content="#FFECD1">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Kufam:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* ===== Body ===== */
body{
  font-family:'Cairo',sans-serif; /* default font for all except hero main text */
  background:#FFECD1;
  min-height:100vh;
  display:flex;
  justify-content:flex-end; /* push container to bottom */
  padding:24px 20px calc(24px + env(safe-area-inset-bottom));
}

/* ===== Container (bottom-up) ===== */
.container{
  width:100%;
  max-width:420px;
  margin:0 auto;
  display:flex;
  flex-direction:column-reverse; /* bottom-up stacking */
  gap:24px;
}

/* ===== Logo ===== */
.logo{
  text-align:center;
}
.logo img{
  height:90px;
}

/* ===== Hero ===== */
.hero{
  text-align:center;
  font-family:'Kufam',sans-serif; /* default hero font */
}
.hero h1, .hero h2, .hero h4{
  font-family:'Kufam',sans-serif;
  font-weight:700;
}
.hero h1{
  font-size:32px;
  margin-bottom:6px;
}
.hero h2{
  font-size:30px;
  margin-bottom:7px;
}
.hero h4{
  font-size:20px;
  margin-bottom:5px;
}
.hero h6{
  font-family:'Cairo',sans-serif; /* location text in Cairo */
  color:#777;
  font-size:15px;
}

/* ===== Buttons ===== */
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.row .link-btn{
  justify-content:center;
  padding:14px;
}
.row .btn-left{
  flex-direction:column;
  gap:6px;
  font-size:13px;
}
.links{
  display:flex;
  flex-direction:column;
  gap:14px;
}
.link-btn{
  width:100%;
  background:#b22222;
  font-family:'Cairo',sans-serif;
  border-radius:30px;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  text-decoration:none;
  color:#FFECD1;
  box-shadow:0 6px 14px rgba(0,0,0,.08);
  transition:.25s;
}
.link-btn:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 26px rgba(0,0,0,.15);
}
.btn-left{
  display:flex;
  align-items:center;
  gap:12px;
  font-weight:600;
}
svg{
  width:20px;
  height:20px;
  display:block;
  flex-shrink:0;
}

/* TikTok Button */
.tiktok{
  background:#b22222;
}
/* Call Button */
.call{
  background:#b22222;
}

/* ===== Footer ===== */
.footer{
  text-align:center;
  font-size:12px;
  color:#888;
  margin-top:12px; /* spacing above footer */
}
</style>
</head>

<body>

<div class="container">

  <!-- Footer -->
  <div class="footer">© All Rights Reserved
  <div>— Made by MirāStudio</div>
  </div>

  <!-- Links -->
  <div class="links">

    <!-- Row 1: Instagram | TikTok -->
    <div class="row">
      <a class="link-btn" href="#" aria-label="Instagram">
        <div class="btn-left">
          <!-- Instagram SVG -->
          <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M7.75 2C4.678 2 2 4.678 2 7.75v8.5C2 19.322 4.678 22 7.75 22h8.5C19.322 22 22 19.322 22 16.25v-8.5C22 4.678 19.322 2 16.25 2h-8.5zm0 2h8.5C18.433 4 20 5.567 20 7.75v8.5c0 2.183-1.567 3.75-3.75 3.75h-8.5C5.567 20 4 18.433 4 16.25v-8.5C4 5.567 5.567 4 7.75 4zm8.25 1.5a1.25 1.25 0 110 2.5 1.25 1.25 0 010-2.5zM12 7a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6z"/>
          </svg>
          Instagram
        </div>
      </a>

      <a class="link-btn tiktok" href="#" aria-label="TikTok">
        <div class="btn-left">
          <!-- TikTok SVG -->
          <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12.75 2c.3 2.1 1.5 3.7 3.5 4.2v3.2c-1.3-.1-2.6-.5-3.7-1.2v6.6c0 3.3-2.7 6-6 6S.5 18.1.5 14.8 3.2 8.8 6.5 8.8c.5 0 1 .1 1.5.2v3.3c-.4-.2-.9-.3-1.5-.3-1.8 0-3.3 1.5-3.3 3.3S4.7 18.6 6.5 18.6s3.3-1.5 3.3-3.3V2h2.95z"/>
          </svg>
          TikTok
        </div>
      </a>
    </div>

    <!-- Location Button -->
    <a class="link-btn" href="#" aria-label="Location — To go">
      <div class="btn-left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 21s-6-5.33-6-10a6 6 0 1112 0c0 4.67-6 10-6 10z"/>
        <circle cx="12" cy="11" r="2"/>
        </svg>
        Location — To go
      </div>
    </a>

    <!-- Row 2: WhatsApp | Call -->
    <div class="row">
      <a class="link-btn" href="#" aria-label="Send WhatsApp">
        <div class="btn-left">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2C6.486 2 2 6.486 2 12c0 2.1.55 4.05 1.5 5.75L2 22l4.25-1.5A9.935 9.935 0 0012 22c5.514 0 10-4.486 10-10S17.514 2 12 2z"/>
          </svg>
          Send WhatsApp
        </div>
      </a>

      <a class="link-btn call" href="#" aria-label="Call Now">
        <div class="btn-left">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011-.27 11.72 11.72 0 003.7.59 1 1 0 011 1V21a1 1 0 01-1 1A19 19 0 012 5a1 1 0 011-1h3.5a1 1 0 011 1 11.72 11.72 0 00.59 3.7 1 1 0 01-.27 1z"/>
          </svg>
          Call Now
        </div>
      </a>
    </div>

    <!-- Order Menu -->
    <a class="link-btn" href="#" aria-label="Food Menu — Order">
      <div class="btn-left">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 4h18v2H3V4zm0 6h18v2H3v-2zm0 6h18v2H3v-2z"/>
        </svg>
        Food Menu — Order
      </div>
    </a>

  </div>

  <!-- Hero -->
  <div class="hero">
    <h4>مطبخ ومطعم</h4>
    <h1>ملك المندي</h1>
    <h2>مضغوط والحاشي</h2>
    <h6>الســامر، جدة</h6>
  </div>

  <!-- Logo -->
  <div class="logo">
    <img src="https://cdn.qrmenu.com/king-of-mandi-and-madgout/mydop-images/imga5885b90-34ed-459e-9bce-f6b0d2b01f52.webp" alt="شعار ملك المندي" loading="eager">
  </div>

</div>
</body>
</html>
